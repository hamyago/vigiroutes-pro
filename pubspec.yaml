name: vigiroutes_provider
description: VigiRoutes — Application prestataire
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Auth Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3

  # HTTP + WebSockets natif (remplace pusher)
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.7

  # Maps & Location
  google_maps_flutter: ^2.6.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Notifications locales
  flutter_local_notifications: ^18.0.1

  # UI
  cached_network_image: ^3.3.1
  timeago: ^3.6.1
  image_picker: ^1.1.2
  pinput: ^5.0.0
  intl_phone_field: ^3.2.0

  # Utils
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  intl: ^0.19.0
  http: ^1.2.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/raw/

  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Regular.ttf
          weight: 400
        - asset: fonts/Poppins-Medium.ttf
          weight: 500
        - asset: fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: fonts/Poppins-Bold.ttf
          weight: 700

dependency_overrides:
  path_provider_android: 2.2.12
  