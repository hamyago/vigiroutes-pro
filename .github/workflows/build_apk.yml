name: Build VigiRoutes Pro APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      # IMPORTANT : google-services.json est requis pour Firebase Phone Auth
      - name: Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/vigiroutes-release.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=vigiroutes" >> android/key.properties
          echo "storeFile=app/vigiroutes-release.jks" >> android/key.properties

      - name: Flutter pub get
        run: flutter pub get

      # Supprimer le MainActivity en double (résidu du mauvais package)
      - name: Remove duplicate MainActivity
        run: |
          rm -rf android/app/src/main/kotlin/ci/oyopmt/vigiroutes/vigiroutes_provider

      - name: Build APK Release
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vigiroutes-pro-${{ github.run_number }}
          path: build/app/outputs/apk/release/app-release.apk
          retention-days: 30
